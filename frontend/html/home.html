<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>HOME</title>

    <style>
        .fundal {
            background-image: url("poza_fundal.png");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            height: 100vh; 
            width: 100%;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        body{
            margin: 0;
        }

        .buton_start{

            background: none;
            border: none;
            padding: 0;
            cursor: pointer;
        }

        .buton_start img{
            width: 400px;
            transition: transform 0.2s;
        }

        .buton_start img:hover{
            transform: scale(1.1);
        }
    </style>
</head>

<body>
    <div class="fundal">
        <button class="buton_start">
            <img src="poza_buton.png">
        </button>
    </div>

</body>


</html>
