<!DOCTYPE html>
<html lang="ro">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harta Nivele Duolingo</title>
    <link rel="stylesheet" href="pag.css">
</head>

<body>

    <div
        style="background-color: #6e348c; width: 100%; color: white; padding: 25px; text-align: center; box-shadow: 0 4px 0 #4a1e62; margin-bottom: 20px; border-bottom: 2px solid #9d50bb;">
        <h2 style="margin: 0; letter-spacing: 2px; text-transform: uppercase; font-size: 1.2rem;">Lumea Magica</h2>
    </div>

    <div class="map-container">
        <div class="level-node completed" style="--offset: 0.2">
            <div class="node-inner" style="width: 40px; height: 35px; font-size: 14px;">1</div>
        </div>

        <div class="level-node completed" style="--offset: -0.2">
            <div class="node-inner" style="width: 50px; height: 45px; font-size: 14px;">2</div>
        </div>

        <div class="level-node current available" style="--offset: 0.2">
            <div class="start-bubble">START</div>
            <div class="node-inner">3</div>
        </div>

        <div class="level-node locked" style="--offset: 0.4">
            <div class="node-inner">4</div>
        </div>

        <div class="level-node locked" style="--offset: +0.3">
            <div class="node-inner">5</div>
        </div>
    </div>
    <script src="pag.js"></script>
</body>

</html>
